    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Quelle est la différence entre une entreprise et une société ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Une entreprise individuelle (micro-entreprise) est exploitée en nom propre par une seule personne, sans création de personne morale distincte. Une société (SARL, SAS, SASU, SA, SCI…) est une entité juridique à part entière avec ses propres statuts, un capital social et une responsabilité limitée aux apports."
          }
        },
        {
          "@type": "Question",
          "name": "Quels sont les délais pour créer une micro-entreprise ou une société ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pour une micro-entreprise, l'immatriculation sur le guichet unique de l'INPI se fait en 24 à 48h. Pour une société (SARL, SAS, SA…), comptez 1 à 2 semaines : rédaction des statuts, dépôt du capital, publication d'annonce légale et immatriculation au greffe."
          }
        },
        {
          "@type": "Question",
          "name": "Combien coûte la création d'une entreprise ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La création de société commence dès 0 € HT (hors frais administratifs d'environ 190 €). La micro-entreprise est à partir de 59 € HT. Juridique Pro propose des forfaits transparents : Basique, Standard et Express selon le niveau d'accompagnement souhaité."
          }
        },
        {
          "@type": "Question",
          "name": "Quelles sont les formes de sociétés que vous créez ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Juridique Pro crée toutes les formes de sociétés : SARL, SAS, SASU, SA, SCI, EURL, SNC, et bien d'autres. Cela inclut la rédaction des statuts sur mesure, le dépôt du capital social, la publication de l'annonce légale et l'immatriculation complète."
          }
        },
        {
          "@type": "Question",
          "name": "Intervenez-vous sur toute la France ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, Juridique Pro accompagne entrepreneurs et dirigeants de sociétés partout en France. Avec des bureaux à Vénissieux (Lyon) et Nice, l'entreprise couvre tout le territoire grâce à ses outils digitaux et au guichet unique INPI."
          }
        },
        {
          "@type": "Question",
          "name": "Proposez-vous la domiciliation commerciale ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, Juridique Pro propose des adresses de domiciliation à Lyon et Nice à partir de 19 € HT/mois pour les micro-entreprises et 29 € HT/mois pour les sociétés. Ce service inclut la réexpédition du courrier, la numérisation des documents et une attestation de domiciliation."
          }
        },
        {
          "@type": "Question",
          "name": "Quelles formalités gérez-vous pour les micro-entreprises ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Juridique Pro prend en charge l'immatriculation de votre micro-entreprise sur l'INPI, la modification de votre activité (changement d'adresse, d'activité principale…) ainsi que la cessation d'activité. L'entreprise conseille également sur les obligations URSSAF."
          }
        },
        {
          "@type": "Question",
          "name": "Proposez-vous un suivi après la création ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolument. Que vous soyez micro-entrepreneur ou dirigeant de société, Juridique Pro assure un suivi continu : mise à jour de vos obligations, modifications statutaires, comptabilité et conseil stratégique pour pérenniser votre activité."
          }
        }
      ]
    }
    </script>
