databases:
  - name: juridiquepro-db
    plan: free
    databaseName: juridiquepro
    user: juridiquepro

services:
  - type: web
    name: juridiquepro-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: juridiquepro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://projuridique.com
